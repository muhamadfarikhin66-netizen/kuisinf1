<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Komponen Komputer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#0f0c29; color:white; text-align:center; padding:20px; }
.drop-zone {
  display:inline-block;
  min-width:150px;
  padding:10px;
  border:2px dashed #8b5cf6;
  border-radius:10px;
  margin:5px;
}
.drag-card {
  display:inline-block;
  padding:10px 20px;
  border:2px solid #8b5cf6;
  border-radius:10px;
  margin:10px;
  cursor:grab;
}
.correct { border-color:green; }
.incorrect { border-color:red; }
</style>
</head>

<body>

<h1>Kuis Komponen Komputer</h1>
<p>Drag jawaban ke tempat yang benar</p>

<p>
Dalam sistem komputer,
<span class="drop-zone" data-answer="CPU" id="z1">?</span>
adalah otak komputer,
<span class="drop-zone" data-answer="RAM" id="z2">?</span>
untuk penyimpanan sementara,
dan
<span class="drop-zone" data-answer="Harddisk / SSD" id="z3">?</span>
untuk penyimpanan permanen.
</p>

<div>
<div class="drag-card" draggable="true">CPU</div>
<div class="drag-card" draggable="true">RAM</div>
<div class="drag-card" draggable="true">Harddisk / SSD</div>
</div>

<br>
<button onclick="cek()">Cek Jawaban</button>

<script>
let dragged = "";

document.querySelectorAll('.drag-card').forEach(el=>{
  el.addEventListener('dragstart', e=>{
    dragged = el.innerText;
  });
});

document.querySelectorAll('.drop-zone').forEach(zone=>{
  zone.addEventListener('dragover', e=>e.preventDefault());

  zone.addEventListener('drop', e=>{
    zone.innerText = dragged;
  });
});

function cek(){
  document.querySelectorAll('.drop-zone').forEach(z=>{
    if(z.innerText === z.dataset.answer){
      z.classList.add('correct');
      z.classList.remove('incorrect');
    } else {
      z.classList.add('incorrect');
      z.classList.remove('correct');
    }
  });
}
</script>

</body>
</html>
