<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Komponen Komputer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  text-align:center;
  padding:20px;
}

.drop-zone {
  min-width:140px;
  min-height:40px;
  border:2px dashed #8b5cf6;
  border-radius:10px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:5px;
}

.drag-card {
  padding:10px 20px;
  border:2px solid #8b5cf6;
  border-radius:10px;
  margin:10px;
  cursor:grab;
}

.correct { border-color:#10b981; }
.incorrect { border-color:#ef4444; }

button {
  padding:10px 20px;
  border-radius:10px;
  background:#8b5cf6;
  margin-top:20px;
}
</style>
</head>

<body>

<h1 class="text-2xl font-bold mb-4">Kuis Komponen Komputer</h1>

<p class="mb-6">
Dalam sistem komputer,
<span class="drop-zone" data-answer="CPU" data-index="1"></span>
adalah otak komputer,
<span class="drop-zone" data-answer="RAM" data-index="2"></span>
untuk penyimpanan sementara,
dan
<span class="drop-zone" data-answer="Harddisk / SSD" data-index="3"></span>
untuk penyimpanan permanen.
</p>

<div>
<div class="drag-card" draggable="true" data-value="CPU">CPU</div>
<div class="drag-card" draggable="true" data-value="RAM">RAM</div>
<div class="drag-card" draggable="true" data-value="Harddisk / SSD">Harddisk / SSD</div>
</div>

<button onclick="checkAnswers()" id="btn">Cek Jawaban</button>

<script>
let filled = {};

const cards = document.querySelectorAll('.drag-card');
const zones = document.querySelectorAll('.drop-zone');

cards.forEach(card=>{
  card.addEventListener('dragstart', e=>{
    e.dataTransfer.setData("text", card.dataset.value);
  });
});

zones.forEach(zone=>{
  zone.addEventListener('dragover', e=>{
    e.preventDefault();
  });

  zone.addEventListener('drop', e=>{
    e.preventDefault();

    let value = e.dataTransfer.getData("text");
    let index = zone.dataset.index;

    zone.innerText = value;
    filled[index] = value;
  });
});

function checkAnswers(){
  let score = 0;

  zones.forEach(z=>{
    let correct = z.dataset.answer === filled[z.dataset.index];

    z.classList.remove('correct','incorrect');

    if(correct){
      z.classList.add('correct');
      score++;
    } else {
      z.classList.add('incorrect');
    }
  });

  alert("Skor: " + score + " / 3");
}
</script>

</body>
</html>
