<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Komputer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* container */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  max-width:700px;
  text-align:center;
}

/* drop */
.drop-zone {
  min-width:150px;
  min-height:45px;
  border:2px dashed #8b5cf6;
  border-radius:12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:5px;
  transition:0.3s;
}

.drop-zone:hover {
  background:rgba(139,92,246,0.1);
}

/* drag */
.drag-card {
  padding:12px 25px;
  border-radius:12px;
  border:2px solid #8b5cf6;
  margin:10px;
  cursor:grab;
  transition:0.3s;
}

.drag-card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(139,92,246,0.3);
}

/* result */
.correct { border-color:#10b981 !important; }
.incorrect { border-color:#ef4444 !important; }

/* button */
button {
  margin-top:20px;
  padding:12px 25px;
  border-radius:12px;
  background:linear-gradient(135deg,#8b5cf6,#06b6d4);
  font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h1 class="text-2xl font-bold mb-4">Kuis Komponen Komputer</h1>

<p class="mb-6 leading-relaxed">
Dalam sistem komputer,
<span class="drop-zone" data-answer="CPU" data-index="1"></span>
berfungsi sebagai otak komputer,
<span class="drop-zone" data-answer="RAM" data-index="2"></span>
digunakan untuk penyimpanan sementara,
dan
<span class="drop-zone" data-answer="Harddisk / SSD" data-index="3"></span>
sebagai penyimpanan permanen.
</p>

<div>
<div class="drag-card" draggable="true" data-value="CPU">CPU</div>
<div class="drag-card" draggable="true" data-value="RAM">RAM</div>
<div class="drag-card" draggable="true" data-value="Harddisk / SSD">Harddisk / SSD</div>
</div>

<button onclick="checkAnswers()">Cek Jawaban</button>

</div>

<script>
let filled = {};

const cards = document.querySelectorAll('.drag-card');
const zones = document.querySelectorAll('.drop-zone');

cards.forEach(card=>{
  card.addEventListener('dragstart', e=>{
    e.dataTransfer.setData("text", card.dataset.value);
  });
});

zones.forEach(zone=>{
  zone.addEventListener('dragover', e=> e.preventDefault());

  zone.addEventListener('drop', e=>{
    e.preventDefault();

    let value = e.dataTransfer.getData("text");
    let index = zone.dataset.index;

    zone.innerText = value;
    filled[index] = value;
  });
});

function checkAnswers(){
  let score = 0;

  zones.forEach(z=>{
    let correct = z.dataset.answer === filled[z.dataset.index];

    z.classList.remove('correct','incorrect');

    if(correct){
      z.classList.add('correct');
      score++;
    } else {
      z.classList.add('incorrect');
    }
  });

  alert("Skor: " + score + " / 3");
}
</script>

</body>
</html>
